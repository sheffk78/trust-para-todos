# Railway service config — Trust Para Todos Backend (FastAPI)
# Deploy this as a separate Railway service pointing at the `backend/` directory.

[build]
builder = "NIXPACKS"
buildCommand = ""
startCommand = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[service]
port = 8000