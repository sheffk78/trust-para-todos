# Railway service config — Trust Para Todos Backend (FastAPI)
# Uses Dockerfile for Chromium-based PDF generation

[build]
builder = "DOCKERFILE"
buildCommand = ""
startCommand = ""

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[service]
port = 8000
